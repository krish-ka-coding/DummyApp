workflows:
  my-mobile-app-workflow:        # Unique ID for your workflow
    name: Build & Deploy App     # Name displayed in the Codemagic UI
    instance_type: mac_mini_m2   # M2 instance standard tier
    max_build_duration: 60       # Max timeout in minutes (up to 120)

    environment:
      groups:
        - keystore_credentials   # Variable groups pulled from the Codemagic UI
      vars:
        PUBLIC_API_URL: "https://api.example.com"
      flutter: stable            # Enforce specific framework/tool versions
      xcode: latest

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Fetch dependencies
        script: |
          # Robust search and change directory that avoids syntax errors
          TARGET_DIR=$(find . -name "pubspec.yaml" -maxdepth 3 -exec dirname {} \; | head -n 1)
          cd "$TARGET_DIR"
          flutter pub get
      - name: Run Tests
        script: |
          TARGET_DIR=$(find . -name "pubspec.yaml" -maxdepth 3 -exec dirname {} \; | head -n 1)
          cd "$TARGET_DIR"
          flutter test
      - name: Build Android Application
        script: |
          TARGET_DIR=$(find . -name "pubspec.yaml" -maxdepth 3 -exec dirname {} \; | head -n 1)
          cd "$TARGET_DIR"
          flutter build apk --release
      - name: Build iOS Application
        script: |
          TARGET_DIR=$(find . -name "pubspec.yaml" -maxdepth 3 -exec dirname {} \; | head -n 1)
          cd "$TARGET_DIR"
          flutter build ipa --release --no-codesign

    artifacts:
      - "**/build/app/outputs/flutter-apk/*_release.apk"
      - "**/build/ios/iphoneos/*.ipa"

    publishing:
      email:
        recipients:
          - dev-team@example.com
      slack:
        channel: "https://hooks.slack.com/services/..."