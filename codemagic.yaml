# Corrected Codemagic CI/CD for React Native iOS
workflows:
  ios-simulator-build:
    name: iOS Simulator Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_filter:
        include:
          - main
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS Simulator App
        script: |
          xcodebuild \
            -workspace ios/dummyApp.xcworkspace \
            -scheme dummyApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
