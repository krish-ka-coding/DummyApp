workflows:
  react-native-build:
    name: React Native Android & iOS

    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ios/Pods

    scripts:
      - name: Install Node dependencies
        script: |
          npm ci || npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build Android AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Archive iOS App
        script: |
          cd ios

          xcodebuild \
            -workspace dummyApp.xcworkspace \
            -scheme dummyApp \
            -configuration Release \
            -archivePath build/dummyApp.xcarchive \
            archive

      - name: Export IPA
        script: |
          cd ios

          xcodebuild \
            -exportArchive \
            -archivePath build/dummyApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
      - ios/build/**/*.ipa