# Codemagic CI/CD Build Configuration for React Native iOS
# Place this file in the root of your repository to run builds on Codemagic.

workflows:
  ios-simulator-build:
    name: iOS Simulator Debug Build (Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest # Uses latest stable Xcode version
      cocoapods: default
    triggering:
      events:
        - push
      branches:
        - main
    caching:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS Simulator App
        script: |
          # Build a simulator debug bundle. No Apple Developer credentials or signing certificates needed.
          xcodebuild \
            -workspace ios/dummyApp.xcworkspace \
            -scheme dummyApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app

  ios-release-build:
    name: iOS Release IPA Build (Signed)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials # Import certificates/profiles group from Codemagic UI
      node: latest
      xcode: latest
      cocoapods: default
    caching:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Set up iOS code signing
        script: |
          # Initialize keychain and import certificates using Codemagic CLI tools
          keychain initialize
          # Fetch and import provisioning profiles automatically from Apple Developer Portal
          # Note: Requires setup of APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID,
          # and APP_STORE_CONNECT_PRIVATE_KEY environment variables in the group 'apple_credentials'
          app-store-connect fetch-signing-files "com.example.dummyApp" --project-type ios --create
          keychain add-certificates
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS IPA
        script: |
          # Compile the signed iOS release app
          xcode-project build-ipa \
            -workspace ios/dummyApp.xcworkspace \
            -scheme dummyApp \
            -configuration Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - admin@example.com # Replace with your email to receive build updates
        notify:
          on_build_success: true
          on_build_failure: true
