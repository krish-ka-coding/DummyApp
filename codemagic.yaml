workflows:
  react-native-build:
    name: Build & Deploy React Native

    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      node: 20

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ios/Pods

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Run tests (optional)
        script: |
          npm test || true

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build Android AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - your-email@example.com